# ════════════════════════════════════════════════════════════════
#  CaptureNest — Docker Compose
#  Run with:  docker compose up --build
#  Dashboard: http://localhost:3000
# ════════════════════════════════════════════════════════════════

services:

  # ── React frontend (nginx) ──────────────────────────────────────
  capturenest-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - capturenest-api
    networks:
      - capturenest-net
    restart: unless-stopped

  # ── Fastify API server ──────────────────────────────────────────
  capturenest-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT:            "4000"
      HOST:            "0.0.0.0"
      NODE_ENV:        "production"
      DB_PATH:         "/data/capturenest.db"
      MEDIA_PATH:      "/media"
      OLLAMA_URL:      "http://ollama:11434"
      OLLAMA_MODEL:    "${OLLAMA_MODEL:-llava}"
      EMBED_MODEL:      "${EMBED_MODEL:-nomic-embed-text}"
      EMBED_DIMENSIONS: "768"
      QDRANT_URL:      "http://qdrant:6333"
      CORS_ORIGIN:     "http://localhost:3000"
      LOG_LEVEL:       "info"
    volumes:
      - media:/media
      - dbdata:/data
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - capturenest-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 15s

  # ── Ollama (local AI / LLM inference) ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    networks:
      - capturenest-net
    restart: unless-stopped
    # To use GPU acceleration instead:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Qdrant (vector database for semantic search) ───────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant:/qdrant/storage
    networks:
      - capturenest-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 10s

# ── Named volumes ──────────────────────────────────────────────────
volumes:
  media:
  dbdata:
  ollama:
  qdrant:

# ── Internal network ───────────────────────────────────────────────
networks:
  capturenest-net:
    driver: bridge
